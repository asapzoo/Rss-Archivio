<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoo 105 — Diretta TV</title>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: #12121a;
      border: 1px solid #2a2a3e;
      border-radius: 16px;
      padding: 28px 24px;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }
    .logo { font-size: 34px; font-weight: 900; letter-spacing: 3px; color: #ff3c3c; margin-bottom: 4px; }
    .logo span { color: #e8e8f0; }
    .subtitle { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: #7070a0; margin-bottom: 24px; }

    /* CHANNEL SELECTOR */
    .channels { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .ch-btn {
      background: #1a1a26;
      border: 1px solid #2a2a3e;
      color: #7070a0;
      border-radius: 10px;
      padding: 14px 10px;
      cursor: pointer;
      transition: all .2s;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
    }
    .ch-btn .ch-icon { font-size: 22px; display: block; margin-bottom: 5px; }
    .ch-btn .ch-name { display: block; color: #c0c0e0; font-size: 12px; font-weight: 700; }
    .ch-btn .ch-sub  { display: block; color: #7070a0; font-size: 10px; letter-spacing: 1px; margin-top: 2px; }
    .ch-btn:hover { border-color: #ff3c3c; color: #e8e8f0; }
    .ch-btn.active {
      border-color: #ff3c3c;
      background: rgba(255,60,60,0.1);
    }
    .ch-btn.active .ch-name { color: #ff3c3c; }

    /* LIVE BADGE */
    .live-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(255,60,60,0.15); border: 1px solid #ff3c3c;
      color: #ff3c3c; font-size: 11px; font-weight: 700;
      letter-spacing: 2px; padding: 4px 14px; border-radius: 20px; margin-bottom: 18px;
    }
    .live-dot { width: 7px; height: 7px; background: #ff3c3c; border-radius: 50%; animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    video { width: 100%; border-radius: 10px; background: #000; margin-bottom: 16px; outline: none; }

    .status { font-size: 13px; color: #7070a0; min-height: 20px; margin-bottom: 10px; }
    .status.error { color: #ff6060; }
    .status.ok    { color: #00e676; }
    .status.buf   { color: #ffd740; }

    .btn-retry {
      display: none;
      margin: 0 auto;
      padding: 10px 24px;
      background: #ff3c3c; color: white; border: none;
      border-radius: 8px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .2s;
    }
    .btn-retry:hover { background: #ff5555; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">ZOO<span>105</span></div>
    <div class="subtitle">Seleziona canale</div>

    <div class="channels">
      <button class="ch-btn active" id="btn-0" onclick="switchChannel(0)">
        <span class="ch-icon">📺</span>
        <span class="ch-name">105 Tv</span>
        <span class="ch-sub">DIRETTA</span>
      </button>
      <button class="ch-btn" id="btn-1" onclick="switchChannel(1)">
        <span class="ch-icon">🦁</span>
        <span class="ch-name">Zoo di 105</span>
        <span class="ch-sub">DIRETTA</span>
      </button>
    </div>

    <div class="live-badge"><span class="live-dot"></span> LIVE</div>

    <video id="player" controls autoplay playsinline></video>
    <div class="status" id="status">⏳ Connessione in corso...</div>
    <button class="btn-retry" id="retryBtn" onclick="initPlayer()">↺ Riprova</button>
  </div>

  <script>
    const CHANNELS = [
      { url: 'https://live03-col.msr.cdn.mediaset.net/live/ch-ec/ec-clr.isml/manifest_hr.mpd' },
      { url: 'https://live03-col.msr.cdn.mediaset.net/live/ch-r1/r1-clr.isml/manifest_hr.mpd'  }
    ];

    let current = 0;
    let player;

    function switchChannel(idx) {
      if (idx === current && player) return;
      current = idx;
      document.querySelectorAll('.ch-btn').forEach((b, i) => {
        b.classList.toggle('active', i === idx);
      });
      initPlayer();
    }

    function initPlayer() {
      const video    = document.getElementById('player');
      const status   = document.getElementById('status');
      const retryBtn = document.getElementById('retryBtn');

      status.textContent = '⏳ Connessione in corso...';
      status.className   = 'status';
      retryBtn.style.display = 'none';

      if (player) { try { player.destroy(); } catch(e){} }

      player = dashjs.MediaPlayer().create();
      player.initialize(video, CHANNELS[current].url, true);

      player.on(dashjs.MediaPlayer.events.PLAYBACK_PLAYING, () => {
        status.textContent = '✓ In riproduzione';
        status.className   = 'status ok';
      });

      player.on(dashjs.MediaPlayer.events.ERROR, () => {
        status.textContent = '✗ Errore stream';
        status.className   = 'status error';
        retryBtn.style.display = 'block';
      });

      player.on(dashjs.MediaPlayer.events.PLAYBACK_STALLED, () => {
        status.textContent = '⏳ Buffering...';
        status.className   = 'status buf';
      });
    }

    initPlayer();
  </script>
</body>
</html>
