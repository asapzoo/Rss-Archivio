<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zoo 105 — Diretta TV</title>
  <script src="https://cdn.dashjs.org/latest/dash.all.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0f;
      color: #e8e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .card {
      background: #12121a;
      border: 1px solid #2a2a3e;
      border-radius: 16px;
      padding: 14px;
      max-width: 520px;
      width: 100%;
    }

    /* CHANNEL SELECTOR */
    .channels { display: flex; gap: 8px; margin-bottom: 10px; }
    .ch-btn {
      flex: 1; background: #1a1a26; border: 1px solid #2a2a3e;
      border-radius: 8px; padding: 6px 10px; cursor: pointer;
      transition: all .2s; display: flex; align-items: center; gap: 7px;
    }
    .ch-icon { font-size: 15px; flex-shrink: 0; }
    .ch-text { display: flex; flex-direction: column; align-items: flex-start; }
    .ch-name { font-size: 12px; font-weight: 700; color: #c0c0e0; white-space: nowrap; }
    .ch-sub  { font-size: 9px; color: #7070a0; white-space: nowrap; margin-top: 1px; }
    .ch-btn:hover { border-color: #ff3c3c; }
    .ch-btn.active { border-color: #ff3c3c; background: rgba(255,60,60,0.1); }
    .ch-btn.active .ch-name { color: #ff3c3c; }

    /* LIVE ROW */
    .live-row {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 8px; padding: 0 2px;
    }
    .live-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(255,60,60,0.15); border: 1px solid #ff3c3c;
      color: #ff3c3c; font-size: 10px; font-weight: 700;
      letter-spacing: 2px; padding: 3px 10px; border-radius: 20px;
    }
    .live-dot {
      width: 6px; height: 6px; background: #ff3c3c;
      border-radius: 50%; animation: pulse 1.2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .ch-label { font-size: 11px; color: #7070a0; }

    /* PLAYER AREA */
    .player-wrap { position: relative; width: 100%; background: #000; border-radius: 10px; overflow: hidden; }
    video { width: 100%; display: block; outline: none; }

    /* Nasconde contatore tempo e barra progresso nei controlli nativi (live stream) */
    video::-webkit-media-controls-timeline              { display: none !important; }
    video::-webkit-media-controls-current-time-display  { display: none !important; }
    video::-webkit-media-controls-time-remaining-display{ display: none !important; }
    video::-webkit-media-controls-timeline-container    { display: none !important; }
    /* BOTTOM */
    .bottom-row {
      display: flex; align-items: center; justify-content: space-between;
      min-height: 30px; margin-top: 8px; gap: 8px;
    }
    .status { font-size: 12px; color: #7070a0; flex: 1; }
    .status.error { color: #ff6060; }
    .status.buf   { color: #ffd740; }
    .status.ok    { color: #00e676; }

    .btn-small {
      padding: 4px 12px; border-radius: 6px; font-size: 11px;
      font-weight: 600; cursor: pointer; border: none; white-space: nowrap;
      transition: all .2s; flex-shrink: 0;
    }
    .btn-retry  { background: #ff3c3c; color: white; display: none; }
    .btn-retry:hover  { background: #ff5555; }
  </style>
</head>
<body>
  <div class="card">

    <div class="channels">
      <button class="ch-btn active" id="btn-0" onclick="switchChannel(0)">
        <span class="ch-icon">📺</span>
        <span class="ch-text">
          <span class="ch-name">105 Tv</span>
          <span class="ch-sub">DIRETTA</span>
        </span>
      </button>
      <button class="ch-btn" id="btn-1" onclick="switchChannel(1)">
        <span class="ch-icon">🦁</span>
        <span class="ch-text">
          <span class="ch-name">Zoo di 105</span>
          <span class="ch-sub">DIRETTA 14:00–16:00</span>
        </span>
      </button>
    </div>

    <div class="live-row">
      <div class="live-badge"><span class="live-dot"></span> LIVE</div>
      <span class="ch-label" id="chLabel">105 Tv</span>
    </div>

    <div class="player-wrap">
      <video id="videoEl" controls autoplay playsinline></video>
    </div>

    <div class="bottom-row">
      <div class="status" id="status"></div>
      <button class="btn-small btn-retry" id="retryBtn" onclick="initDash()">↺ Riprova</button>
    </div>

  </div>

  <script>
    const CHANNELS = [
      {
        url:   'https://live03-col.msr.cdn.mediaset.net/live/ch-ec/ec-clr.isml/manifest_hr.mpd',
        label: '105 Tv'
      },
      {
        url:   'https://live03-col.msr.cdn.mediaset.net/live/ch-r1/r1-clr.isml/manifest_hr.mpd',
        label: 'Zoo di 105'
      }
    ];

    let current = 0;
    let player  = null;

    const videoEl  = document.getElementById('videoEl');
    const status   = document.getElementById('status');
    const retryBtn = document.getElementById('retryBtn');
    const chLabel  = document.getElementById('chLabel');

    function switchChannel(idx) {
      if (idx === current && player) return;
      current = idx;
      document.querySelectorAll('.ch-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
      chLabel.textContent = CHANNELS[idx].label;
      initDash();
    }

    function initDash() {
      retryBtn.style.display = 'none';
      status.textContent     = '';
      status.className       = 'status';

      if (player) { try { player.destroy(); } catch(e){} player = null; }

      player = dashjs.MediaPlayer().create();
      player.initialize(videoEl, CHANNELS[current].url, true);

      player.on(dashjs.MediaPlayer.events.PLAYBACK_PLAYING, () => {
        status.textContent     = '';
        retryBtn.style.display = 'none';
      });

      player.on(dashjs.MediaPlayer.events.ERROR, () => {
        status.textContent     = '⚠️ Errore stream — riprova tra qualche secondo.';
        status.className       = 'status error';
        retryBtn.style.display = 'block';
      });

      player.on(dashjs.MediaPlayer.events.PLAYBACK_STALLED, () => {
        status.textContent = '⏳ Buffering...';
        status.className   = 'status buf';
      });
    }

    // Avvio
    initDash();
  </script>
</body>
</html>
